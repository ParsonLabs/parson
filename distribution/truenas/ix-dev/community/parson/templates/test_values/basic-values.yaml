resources:
  limits:
    cpus: 2
    memory: 4096

parson:
  additional_envs: []

network:
  web_port:
    bind_mode: published
    port_number: 1993
    host_ips: []

ix_volumes:
  data: /opt/tests/mnt/data

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  music:
    type: host_path
    read_only: true
    host_path_config:
      acl_enable: false
      path: /opt/tests/mnt/music
