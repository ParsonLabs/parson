<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="dark" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Parson</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }
      body {
        display: grid;
        place-items: center;
        color: rgba(255, 255, 255, 0.72);
        font-family: system-ui, sans-serif;
      }
      .mark {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        background: #080808;
        font-size: 20px;
        font-weight: 700;
        animation: breathe 900ms ease-in-out infinite alternate;
      }
      @keyframes breathe {
        to {
          opacity: 0.5;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .mark {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="mark" aria-label="Parson is starting">P</div>
  </body>
</html>
