<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="dark" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Parson</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #000;
      }
      body {
        display: grid;
        place-items: center;
        color: #fff;
        font:
          700 20px system-ui,
          sans-serif;
      }
      div {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border: 1px solid #ffffff1f;
        border-radius: 12px;
        background: #080808;
      }
      nav {
        -webkit-app-region: drag;
        position: fixed;
        inset: 0 0 auto;
        height: 56px;
      }
      nav span {
        position: absolute;
        right: 0;
        top: 0;
        display: flex;
        height: 56px;
        -webkit-app-region: no-drag;
      }
      button {
        width: 48px;
        border: 0;
        background: transparent;
        color: #a1a1aa;
        font: 18px system-ui;
      }
      button:hover {
        background: #ffffff18;
        color: #fff;
      }
      button:last-child:hover {
        background: #dc2626;
      }
    </style>
  </head>
  <body>
    <nav aria-label="Window title bar">
      <span
        ><button data-window="minimize" aria-label="Minimize">−</button
        ><button data-window="toggleMaximize" aria-label="Maximize">□</button
        ><button data-window="close" aria-label="Close">×</button></span
      >
    </nav>
    <div aria-label="Parson is starting">P</div>
    <script>
      document
        .querySelectorAll("[data-window]")
        .forEach((button) =>
          button.addEventListener("click", () =>
            window.__PARSON_ELECTRON__?.windowControls[
              button.dataset.window
            ]?.(),
          ),
        );
    </script>
  </body>
</html>
