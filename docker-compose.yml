services:
  parson-music:
    image: ghcr.io/parsonlabs/parson:nightly
    # Host networking lets mDNS discovery reach phones and computers on the
    # physical LAN. With bridge networking, direct http://nas-address:1993
    # connections still work but Nearby discovery may not.
    network_mode: host
    volumes:
      - "/path/to/config:/Parson"
      - "/path/to/music:/music:ro"
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:1993/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
