name: Publish Container Image

on:
  push:
    branches:
      - nightly
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish_architecture:
    name: Linux container (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push architecture image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/parsonlabs/parson:${{ github.ref_name }}-${{ matrix.arch }}
            ghcr.io/parsonlabs/parson:sha-${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/${{ matrix.arch }}

  publish_manifest:
    name: Multi-architecture manifest
    needs: publish_architecture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish shared image tags
        run: |
          short_sha="${GITHUB_SHA::7}"
          docker buildx imagetools create \
            --tag "ghcr.io/parsonlabs/parson:${GITHUB_REF_NAME}" \
            --tag "ghcr.io/parsonlabs/parson:sha-${short_sha}" \
            "ghcr.io/parsonlabs/parson:${GITHUB_REF_NAME}-amd64" \
            "ghcr.io/parsonlabs/parson:${GITHUB_REF_NAME}-arm64"
